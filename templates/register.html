{% extends "base.html" %}

{% block content %}
<style>
    .register-container {
        max-width: 500px;
        margin: 0 auto;
    }
    
    .register-container h2 {
        font-size: 2rem;
        color: #fff;
        border-left: 3px solid #ff8c00;
        padding-left: 1rem;
        margin-bottom: 2rem;
    }
    
    .register-card {
        background: #0d0d0d;
        border-radius: 24px;
        padding: 2rem;
        border: 1px solid rgba(255, 140, 0, 0.2);
    }
</style>

<div class="register-container">
    <div class="register-card">
        <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
        
        {% if error %}
        <div class="alert"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" name="email" required placeholder="ваш@email.ru">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Имя пользователя:</label>
                <input type="text" name="username" required placeholder="Как вас называть?">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Пароль:</label>
                <input type="password" name="password" required placeholder="Минимум 4 символа">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-check-circle"></i> Зарегистрироваться
            </button>
        </form>
    </div>
</div>
{% endblock %}
