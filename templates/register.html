{% extends "base.html" %}

{% block content %}
<style>
    .auth-wrapper {
        width: 100%;
        max-width: 100%;
    }
    
    .auth-header {
        margin-bottom: 2rem;
        border-left: 4px solid #ff8c00;
        padding-left: 1.2rem;
    }
    
    .auth-header h2 {
        font-size: 2rem;
        color: #fff;
        margin-bottom: 0.3rem;
    }
    
    .auth-header p {
        color: #888;
        font-size: 0.95rem;
    }
    
    .auth-card {
        background: #0d0d0d;
        border-radius: 24px;
        padding: 2.5rem;
        border: 1px solid rgba(255, 140, 0, 0.2);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
    }
    
    .auth-form {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.8rem;
    }
    
    @media (min-width: 768px) {
        .auth-form {
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }
    }
    
    .form-group {
        margin-bottom: 0;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #ccc;
        font-size: 0.95rem;
    }
    
    .form-group label i {
        width: 20px;
        color: #ff8c00;
    }
    
    .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.2s;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #ff8c00;
        background: #222;
    }
    
    .form-group input::placeholder {
        color: #666;
    }
    
    .auth-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 1rem;
        grid-column: 1 / -1;
    }
    
    .btn-auth {
        padding: 14px 32px !important;
        font-size: 1.05rem !important;
        border-radius: 12px !important;
        min-width: 200px;
    }
    
    .auth-links {
        display: flex;
        gap: 1.5rem;
        align-items: center;
    }
    
    .auth-links a {
        color: #aaa;
        font-size: 0.95rem;
        text-decoration: none;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }
    
    .auth-links a:hover {
        color: #ff8c00;
    }
    
    .alert {
        padding: 1rem 1.2rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        color: #ef4444;
        grid-column: 1 / -1;
    }
    
    @media (max-width: 768px) {
        .auth-card {
            padding: 1.5rem;
        }
        
        .auth-actions {
            flex-direction: column;
            gap: 1rem;
        }
        
        .btn-auth {
            width: 100%;
        }
        
        .auth-links {
            flex-direction: column;
            gap: 0.8rem;
            text-align: center;
        }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-header">
        <h2><i class="fas fa-user-plus" style="color: #ff8c00; margin-right: 0.5rem;"></i> Регистрация</h2>
        <p>Создайте аккаунт и начните делиться историями</p>
    </div>
    
    <div class="auth-card">
        {% if error %}
        <div class="alert"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="post">
            <div class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" required placeholder="ваш@email.ru" autocomplete="email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Имя пользователя</label>
                    <input type="text" name="username" required placeholder="Как вас называть?" autocomplete="username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" name="password" required placeholder="Минимум 4 символа" autocomplete="new-password">
                </div>
                
                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary btn-auth">
                        <i class="fas fa-check-circle"></i> Зарегистрироваться
                    </button>
                    <div class="auth-links">
                        <a href="/login">
                            <i class="fas fa-sign-in-alt"></i> Уже есть аккаунт? Войти
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
