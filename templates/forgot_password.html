{% extends "base.html" %}

{% block content %}
<style>
    .auth-wrapper {
        width: 100%;
        max-width: 100%;
    }
    
    .auth-header {
        margin-bottom: 2rem;
        border-left: 4px solid #ff8c00;
        padding-left: 1.2rem;
    }
    
    .auth-header h2 {
        font-size: 2rem;
        color: #fff;
        margin-bottom: 0.3rem;
    }
    
    .auth-header p {
        color: #888;
        font-size: 0.95rem;
    }
    
    .auth-card {
        background: #0d0d0d;
        border-radius: 24px;
        padding: 2.5rem;
        border: 1px solid rgba(255, 140, 0, 0.2);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
    }
    
    .form-group {
        margin-bottom: 1.8rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #ccc;
        font-size: 0.95rem;
    }
    
    .form-group label i {
        width: 20px;
        color: #ff8c00;
    }
    
    .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        border-radius: 12px;
        font-size: 1rem;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #ff8c00;
        background: #222;
    }
    
    .btn-auth {
        padding: 14px 32px !important;
        font-size: 1.05rem !important;
        border-radius: 12px !important;
        width: 100%;
    }
    
    .message {
        padding: 1rem 1.2rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
    }
    
    .message-success {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid #10b981;
        color: #10b981;
    }
    
    .message-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        color: #ef4444;
    }
    
    .next-step {
        margin-top: 1rem;
        text-align: center;
    }
    
    .next-step .btn {
        display: inline-block;
        text-decoration: none;
        background: #ff8c00;
        color: #000;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    
    .back-link a {
        color: #aaa;
        text-decoration: none;
    }
    
    .back-link a:hover {
        color: #ff8c00;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-header">
        <h2><i class="fas fa-key" style="color: #ff8c00; margin-right: 0.5rem;"></i> Восстановление пароля</h2>
        <p>Введите email — мы отправим код для сброса</p>
    </div>
    
    <div class="auth-card">
        {% if message %}
        <div class="message message-success">
            <i class="fas fa-check-circle"></i> {{ message }}
        </div>
        <div class="next-step">
            <a href="/reset-password" class="btn">
                <i class="fas fa-arrow-right"></i> Перейти к вводу кода
            </a>
        </div>
        {% endif %}
        
        {% if error %}
        <div class="message message-error">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}
        
        {% if not message %}
        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required placeholder="ваш@email.ru">
            </div>
            <button type="submit" class="btn btn-primary btn-auth">
                <i class="fas fa-paper-plane"></i> Отправить код
            </button>
        </form>
        {% endif %}
        
        <div class="back-link">
            <a href="/login"><i class="fas fa-arrow-left"></i> Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
