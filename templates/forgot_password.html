{% extends "base.html" %}

{% block content %}
<style>
    .reset-container {
        max-width: 450px;
        margin: 3rem auto;
    }
    
    .reset-card {
        background: #0d0d0d;
        border-radius: 24px;
        padding: 2rem;
        border: 1px solid rgba(255, 140, 0, 0.2);
    }
    
    .reset-card h2 {
        color: #ff8c00;
        margin-bottom: 0.5rem;
        text-align: center;
    }
    
    .reset-card p {
        color: #888;
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }
    
    .form-group {
        margin-bottom: 1.2rem;
    }
    
    .form-group label {
        display: block;
        color: #aaa;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
    }
    
    .form-group input {
        width: 100%;
        padding: 0.8rem;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: #fff;
        font-size: 1rem;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #ff8c00;
    }
    
    .btn-submit {
        width: 100%;
        padding: 0.8rem;
        background: #ff8c00;
        color: #000;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .btn-submit:hover {
        background: #ffa233;
        transform: translateY(-2px);
    }
    
    .message {
        padding: 0.8rem;
        border-radius: 12px;
        margin-bottom: 1rem;
        text-align: center;
        font-size: 0.9rem;
    }
    
    .message-success {
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid #10b981;
        color: #10b981;
    }
    
    .message-error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid #ef4444;
        color: #ef4444;
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    
    .back-link a {
        color: #ff8c00;
        text-decoration: none;
        font-size: 0.85rem;
    }
    
    .back-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="reset-container">
    <div class="reset-card">
        <h2><i class="fas fa-key"></i> Восстановление пароля</h2>
        <p>Введите ваш email — мы отправим код для сброса пароля</p>
        
        {% if message %}
        <div class="message message-success"><i class="fas fa-check-circle"></i> {{ message }}</div>
        {% endif %}
        
        {% if error %}
        <div class="message message-error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="post">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" required placeholder="ваш@email.ru">
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> Отправить код
            </button>
        </form>
        
        <div class="back-link">
            <a href="/login"><i class="fas fa-arrow-left"></i> Вернуться ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
